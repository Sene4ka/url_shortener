name: CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          go test -v -race -coverprofile=coverage/coverage.out -covermode=atomic ./...
        shell: bash

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: 'v2.11.3'
          args: --timeout=5m

  format:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Check gofmt
        run: |
          test -z "$(gofmt -l . | tee /dev/stderr)"

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [test, lint, format]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build for Linux
        run: |
          GOOS=linux GOARCH=amd64 go build -o shortener-linux-amd64 ./cmd/shortener
          GOOS=linux GOARCH=arm64 go build -o shortener-linux-arm64 ./cmd/shortener

      - name: Build for Windows
        run: |
          GOOS=windows GOARCH=amd64 go build -o shortener-windows-amd64.exe ./cmd/shortener

      - name: Build for macOS
        run: |
          GOOS=darwin GOARCH=amd64 go build -o shortener-darwin-amd64 ./cmd/shortener
          GOOS=darwin GOARCH=arm64 go build -o shortener-darwin-arm64 ./cmd/shortener

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: shortener-binaries-${{ github.sha }}
          path: |
            shortener-*.exe
            shortener-*
          retention-days: 0

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint, format]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t shortener:latest .

      - name: Save Docker image as tar
        run: docker save shortener:latest -o shortener-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: shortener-image-${{ github.sha }}
          path: shortener-image.tar
          retention-days: 1

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [build-docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: shortener-image-${{ github.sha }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/shortener-image.tar

      - name: Run e2e tests
        run: go test -v -tags=e2e ./tests/e2e/...

  push-docker:
    name: Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: shortener-image-${{ github.sha }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/shortener-image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push image
        run: |
          docker tag shortener:latest ${{ secrets.DOCKER_USERNAME }}/shortener:latest
          docker tag shortener:latest ${{ secrets.DOCKER_USERNAME }}/shortener:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/shortener:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/shortener:${{ github.sha }}
